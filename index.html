<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO -->
    <title>PDFSCAN · 在线PDF扫描件模拟器 | Free Online PDF Scan Simulator</title>
    <meta name="description" content="免费且安全的在线PDF扫描件生成器，支持一键将干净的PDF文件转换为质感真实、带噪点、倾斜和模糊的扫描件效果。纯前端处理，文件绝不上传，保护您的隐私安全。Free and secure online PDF scan simulator that converts clean PDFs into realistic scanned documents with noise, skew, and blur. Processed locally in browser for maximum privacy.">
    <meta name="keywords" content="PDFSCAN, PDF扫描件, PDF扫描效果模拟器, 扫描件生成器, PDF scan simulator, look scanned, scan generator, pdf to scan, online scanner, 扫描版PDF" />
    <meta name="author" content="PDFSCAN" />

    <!-- Google Fonts (非阻塞加载) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" /></noscript>

    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <script>
      function initTheme() {
        const savedTheme = localStorage.getItem('pdfscan-theme') || 'system';
        if (savedTheme === 'system') {
          const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
        } else {
          document.documentElement.setAttribute('data-theme', savedTheme);
        }
      }
      initTheme();
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
